services:
  - type: web
    name: falconconnect-v3
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python startup.py"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: falconconnect-v3-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLOSE_API_KEY
        sync: false

databases:
  - name: falconconnect-v3-db
    plan: starter
